<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and patterns -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066CC" stop-opacity="1" />
      <stop offset="100%" stop-color="#0099FF" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="lightBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6F3FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#CCE6FF" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0066CC" stroke-width="0.5" stroke-opacity="0.2" />
    </pattern>
  </defs>

  <!-- Background with grid pattern -->
  <rect width="500" height="400" fill="#F8FBFF" />
  <rect width="500" height="400" fill="url(#gridPattern)" />

  <!-- Central Shield -->
  <g transform="translate(250, 200) scale(1.2)">
    <path d="M0 -100 L60 -60 L60 40 C60 70 30 100 0 115 C-30 100 -60 70 -60 40 L-60 -60 L0 -100Z" 
          fill="url(#lightBlueGradient)" stroke="url(#blueGradient)" stroke-width="3" />
    
    <!-- Digital certificate inside shield -->
    <rect x="-40" y="-50" width="80" height="100" rx="5" fill="white" stroke="#0066CC" stroke-width="1.5" />
    <rect x="-35" y="-45" width="70" height="15" rx="2" fill="#E6F3FF" />
    <rect x="-35" y="-25" width="70" height="5" rx="1" fill="#E6F3FF" />
    <rect x="-35" y="-15" width="50" height="5" rx="1" fill="#E6F3FF" />
    
    <!-- Digital signature visualization -->
    <path d="M-30 10 C-25 0, -15 20, -5 10 S10 20, 20 10" stroke="#0066CC" stroke-width="2" />
    <circle cx="25" cy="10" r="10" fill="#0066CC" fill-opacity="0.1" stroke="#0066CC" stroke-width="1" />
    <text x="23" y="14" font-family="Arial" font-size="12" fill="#0066CC">✓</text>
    
    <!-- Lock symbol at bottom -->
    <rect x="-12" y="35" width="24" height="18" rx="3" fill="url(#blueGradient)" />
    <rect x="-5" y="25" width="10" height="12" rx="5" fill="url(#blueGradient)" />
    <circle cx="0" cy="43" r="3" fill="white" />
  </g>

  <!-- Connecting Nodes and Data Flow -->
  <!-- Left node: Sender -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="40" fill="#E6F3FF" stroke="#0066CC" stroke-width="2" />
    <g transform="translate(-15, -25) scale(0.8)">
      <rect width="40" height="50" rx="3" fill="white" stroke="#0066CC" stroke-width="1.5" />
      <line x1="5" y1="10" x2="35" y2="10" stroke="#0066CC" stroke-opacity="0.5" stroke-width="1" />
      <line x1="5" y1="16" x2="35" y2="16" stroke="#0066CC" stroke-opacity="0.5" stroke-width="1" />
      <line x1="5" y1="22" x2="25" y2="22" stroke="#0066CC" stroke-opacity="0.5" stroke-width="1" />
      <path d="M5 35 C8 30, 15 40, 20 35 S30 40, 35 35" stroke="#0066CC" stroke-width="1" />
    </g>
    <text x="0" y="45" font-family="Arial" font-size="12" text-anchor="middle" fill="#0066CC">Sender</text>
  </g>

  <!-- Right node: Recipient -->
  <g transform="translate(400, 150)">
    <circle cx="0" cy="0" r="40" fill="#E6F3FF" stroke="#0066CC" stroke-width="2" />
    <g transform="translate(-15, -25) scale(0.8)">
      <rect width="40" height="50" rx="3" fill="white" stroke="#0066CC" stroke-width="1.5" />
      <line x1="5" y1="10" x2="35" y2="10" stroke="#0066CC" stroke-opacity="0.5" stroke-width="1" />
      <line x1="5" y1="16" x2="35" y2="16" stroke="#0066CC" stroke-opacity="0.5" stroke-width="1" />
      <line x1="5" y1="22" x2="25" y2="22" stroke="#0066CC" stroke-opacity="0.5" stroke-width="1" />
      <circle cx="29" cy="35" r="8" fill="#E6F3FF" stroke="#0066CC" stroke-width="1" />
      <text x="29" y="39" font-family="Arial" font-size="10" text-anchor="middle" fill="#0066CC">✓</text>
    </g>
    <text x="0" y="45" font-family="Arial" font-size="12" text-anchor="middle" fill="#0066CC">Recipient</text>
  </g>

  <!-- Bottom node: Certificate Authority -->
  <g transform="translate(250, 320)">
    <circle cx="0" cy="0" r="40" fill="#E6F3FF" stroke="#0066CC" stroke-width="2" />
    <g transform="translate(-20, -20) scale(0.6)">
      <rect x="0" y="0" width="70" height="60" rx="5" fill="white" stroke="#0066CC" stroke-width="1.5" />
      <text x="35" y="20" font-family="Arial" font-size="10" text-anchor="middle" fill="#0066CC">CERTIFICATE</text>
      <rect x="10" y="25" width="50" height="25" rx="3" fill="#E6F3FF" stroke="#0066CC" stroke-width="1" />
      <path d="M20 40 L30 30 L40 40" stroke="#0066CC" stroke-width="1.5" fill="none" />
    </g>
    <text x="0" y="45" font-family="Arial" font-size="11" text-anchor="middle" fill="#0066CC">Certificate Authority</text>
  </g>

  <!-- Connection lines -->
  <path d="M140 150 L210 150" stroke="#0066CC" stroke-width="2" stroke-dasharray="4 2" />
  <path d="M290 150 L360 150" stroke="#0066CC" stroke-width="2" stroke-dasharray="4 2" />
  <path d="M100 190 L250 280" stroke="#0066CC" stroke-width="2" />
  <path d="M400 190 L250 280" stroke="#0066CC" stroke-width="2" />
  
  <!-- Data transfer animation -->
  <g transform="translate(175, 150)">
    <circle cx="0" cy="0" r="8" fill="url(#blueGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  <g transform="translate(325, 150)">
    <circle cx="0" cy="0" r="8" fill="url(#blueGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Binary data visualization -->
  <g transform="translate(250, 90)">
    <text font-family="monospace" font-size="12" fill="#0066CC" text-anchor="middle">
      <tspan x="0" y="0">101101</tspan>
      <tspan x="0" y="15">010011</tspan>
    </text>
  </g>

  <!-- Lock icon at top right -->
  <g transform="translate(430, 50)">
    <circle cx="0" cy="0" r="20" fill="#E6F3FF" stroke="#0066CC" stroke-width="1.5" />
    <rect x="-8" y="-2" width="16" height="12" rx="2" fill="url(#blueGradient)" />
    <rect x="-3" y="-10" width="6" height="8" rx="3" fill="url(#blueGradient)" />
    <circle cx="0" cy="4" r="2" fill="white" />
  </g>

  <!-- Globe icon at top left -->
  <g transform="translate(70, 50)">
    <circle cx="0" cy="0" r="20" fill="#E6F3FF" stroke="#0066CC" stroke-width="1.5" />
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#blueGradient)" stroke-width="1.5" />
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="none" stroke="url(#blueGradient)" stroke-width="1" />
    <line x1="-12" y1="0" x2="12" y2="0" stroke="url(#blueGradient)" stroke-width="1" />
    <line x1="0" y1="-12" x2="0" y2="12" stroke="url(#blueGradient)" stroke-width="1" />
  </g>
</svg> 