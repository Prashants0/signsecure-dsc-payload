<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6F0FF" />
      <stop offset="100%" stop-color="#F8FBFF" />
    </linearGradient>
    <linearGradient id="lock-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066CC" />
      <stop offset="100%" stop-color="#0052A3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bg-gradient)" rx="20" />
  
  <!-- Connecting lines and nodes -->
  <circle cx="100" cy="120" r="30" fill="#CCE0FF" stroke="#0066CC" stroke-width="2"/>
  <circle cx="400" cy="120" r="30" fill="#CCE0FF" stroke="#0066CC" stroke-width="2"/>
  <circle cx="250" cy="280" r="30" fill="#CCE0FF" stroke="#0066CC" stroke-width="2"/>
  
  <!-- Person icon (sender) -->
  <circle cx="100" cy="110" r="12" fill="#0066CC"/>
  <path d="M85 135 C85 125, 115 125, 115 135 L115 150 L85 150 L85 135Z" fill="#0066CC"/>
  
  <!-- Person icon (receiver) -->
  <circle cx="400" cy="110" r="12" fill="#0066CC"/>
  <path d="M385 135 C385 125, 415 125, 415 135 L415 150 L385 150 L385 135Z" fill="#0066CC"/>
  
  <!-- Secure server/verification -->
  <rect x="225" y="255" width="50" height="50" rx="5" fill="#0066CC"/>
  <rect x="235" y="265" width="30" height="15" rx="2" fill="white"/>
  <rect x="235" y="285" width="30" height="10" rx="2" fill="white"/>
  
  <!-- Connection paths -->
  <path d="M130 120 L370 120" stroke="#0066CC" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M100 150 L250 250" stroke="#0066CC" stroke-width="2" />
  <path d="M400 150 L250 250" stroke="#0066CC" stroke-width="2" />
  
  <!-- Document from sender -->
  <g transform="translate(130, 80) rotate(15)">
    <rect width="60" height="80" rx="5" fill="white" stroke="#0066CC" stroke-width="2"/>
    <line x1="10" y1="20" x2="50" y2="20" stroke="#0066CC" stroke-width="1"/>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#0066CC" stroke-width="1"/>
    <line x1="10" y1="40" x2="30" y2="40" stroke="#0066CC" stroke-width="1"/>
    
    <!-- Digital signature visualization -->
    <path d="M15 60 C20 50, 25 70, 30 60 S40 70 45 60" stroke="#0066CC" stroke-width="2"/>
    <circle cx="50" cy="60" r="8" fill="#CCE0FF" stroke="#0066CC" stroke-width="1"/>
    <path d="M45 60 L55 60 M50 55 L50 65" stroke="#0066CC" stroke-width="1"/>
  </g>
  
  <!-- Document to receiver -->
  <g transform="translate(310, 80) rotate(-15)">
    <rect width="60" height="80" rx="5" fill="white" stroke="#0066CC" stroke-width="2"/>
    <line x1="10" y1="20" x2="50" y2="20" stroke="#0066CC" stroke-width="1"/>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#0066CC" stroke-width="1"/>
    <line x1="10" y1="40" x2="30" y2="40" stroke="#0066CC" stroke-width="1"/>
    
    <!-- Digital signature visualization -->
    <path d="M15 60 C20 50, 25 70, 30 60 S40 70 45 60" stroke="#0066CC" stroke-width="2"/>
    <circle cx="50" cy="60" r="8" fill="green" stroke="#0066CC" stroke-width="1" opacity="0.5"/>
    <path d="M45 57 L49 64 L55 54" stroke="green" stroke-width="2"/>
  </g>
  
  <!-- Digital keys visualization -->
  <path d="M175 200 L210 200 L210 210 L215 205 L210 200" fill="#0066CC"/>
  <path d="M325 200 L290 200 L290 210 L285 205 L290 200" fill="#0066CC"/>
  
  <!-- Encryption visualization -->
  <circle cx="250" cy="180" r="40" fill="transparent" stroke="#0066CC" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="230" y="185" font-family="monospace" font-size="12" fill="#0066CC">01010</text>
  <text x="235" y="205" font-family="monospace" font-size="12" fill="#0066CC">10110</text>
  <text x="230" y="165" font-family="monospace" font-size="12" fill="#0066CC">11001</text>
  
  <!-- Labels -->
  <text x="80" y="180" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0066CC">Signer</text>
  <text x="380" y="180" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0066CC">Recipient</text>
  <text x="235" y="340" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0066CC">Validation</text>
  <text x="225" y="235" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0066CC">Encryption</text>
</svg> 